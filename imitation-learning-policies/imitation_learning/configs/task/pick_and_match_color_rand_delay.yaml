defaults:
  - _self_

dataset_type: mujoco

workspace:
  train_dataset:
    name: pick_and_match_color_rand_delay
    robot_num: 1
    repeat_dataset_num: ${cond:${in:${policy_name},memory,gated},1,20}
    starting_percentile_max: ${cond:${in:${policy_name},memory,gated},0.0,1}
    dataloader_cfg:
      batch_size: 1
    split_dataloader_cfg:
      batch_size: 8
    used_episode_ratio: 0.996 # Only 2 episodes left for validation to speed up
    image_keys: ["third_person_camera"]

    source_data_meta:
      third_person_camera_feature:
        name: third_person_camera_feature
        include_indices: ${workspace.model.image_indices}
        shape: [768]
    output_data_meta:
      third_person_camera_feature:
        name: third_person_camera_feature
        data_type: low_dim
        length: ${workspace.model.image_length}
        normalizer: identity
        augmentation:
          - name: RandomGaussianNoise
            std: 0.01
            p: 0.5
        shape: [768]
        source_entry_names:
          - third_person_camera_feature
    
  model:
    # memory_gate:
    #   image_encoder:
    #     image_meta: ${workspace.train_dataset.output_data_meta.third_person_camera}
    #     frozen: True
    #   proprio_meta: ${workspace.train_dataset.output_data_meta.robot0_10d}
    max_training_traj_num: 60
    denoising_network_partial:
      max_history_len: 750
    global_cond_encoder:
      # data_meta: 
      #   third_person_camera:
      #     name: third_person_camera
      #     data_type: image
      #     length: ${workspace.model.image_length}
      #     normalizer: identity
      #     augmentation: 
      #       - name: RandomCrop
      #         size: [224, 224]
      #         p: 0.3
      #       - name: Resize
      #         size: [256, 256]
      #         antialias: True
      #       - name: ColorJitter
      #         brightness: 0.3
      #         contrast: 0.4
      #         saturation: 0.5
      #         hue: 0.08
      #         p: 0.3
      #     shape: [3, 256, 256]
      #     source_entry_names:
      #       - third_person_camera
      image_encoder_partial:
        feature_aggregation: map
        frozen: True
    local_cond_encoder:
      # data_meta:
        # robot0_10d:
        #   name: robot0_10d
        #   data_type: low_dim
        #   length: ${workspace.model.proprio_length}
        #   normalizer: range
        #   augmentation: # To avoid the model overfitting to extremely small movements
        #     - name: RandomGaussianNoise
        #       std: 0.005
        #       p: 0.5
        #   shape: [10]
        #   source_entry_names:
        #     - robot0_tcp_xyz_wxyz
        #     - robot0_gripper_width
      image_encoder_partial:
        frozen: True
    history_img_feature_encoder:
      data_meta: ${workspace.model.global_cond_encoder.data_meta}
      image_encoder_partial:
        frozen: True
    image_length: 8
    image_indices: ${range:-7,1,1} # Dense image history. Comment this out to use sparse image history (only [0])
  trainer:
    keep_saving_keywords: []

_keys_to_remove_:
  - workspace.train_dataset.source_data_meta.third_person_camera
  - workspace.train_dataset.output_data_meta.third_person_camera