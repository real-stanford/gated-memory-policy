defaults:
  - real_world_single_traj
  - _self_

_target_: imitation_learning.datasets.mujoco_dataset.MujocoMultiTrajDataset

# traj_num: ${eval:"${workspace.model.denoising_network_partial.max_history_len}+1"}
traj_num: 32 # To better match the inference time (history should be full after the first max_history_len trajectories)
traj_interval_min: 4
traj_interval_max: 8

index_pool_size_per_episode: 100

dataloader_cfg:
  batch_size: 4 # For finetuning including the non-history modules. The actual batch size is 4 * 40 (traj_num) = 160

starting_percentile_max: 0.1

source_data_meta:
  action0_is_critical:
    name: action0_is_critical
    include_indices: ${range:0,${workspace.model.action_length}}
    shape: [1]

output_data_meta:
  action_is_critical:
    name: action_is_critical
    data_type: low_dim
    length: ${workspace.model.action_length}
    normalizer: identity
    augmentation: []
    shape: [1]
    source_entry_names:
      - action0_is_critical


split_dataloader_cfg:
  batch_size: 16
  num_workers: 24
  pin_memory: true
  persistent_workers: true
  shuffle: false
  prefetch_factor: 1

repeat_dataset_num: 1 # How many times to repeat the dataset. Multi-traj dataset is comsumed much slower than single-traj dataset.