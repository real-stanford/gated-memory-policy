_target_: imitation_learning.datasets.mujoco_dataset.MujocoSingleTrajDataset

root_dir: ???
name: ???
compressed_dir: "" # Should be overridden if need to extract the dataset from a compressed file
robot_num: ???

include_episode_num: -1 # To specify how many episodes to include. -1 means using all episodes.
include_episode_indices: [] # If not empty, will override used_episode_ratio
used_episode_ratio: 0.98 # How many episodes are used for training

random_split_dataset: true # If false, will not use random split for the dataset
history_padding_length: ${workspace.model.history_padding_length}
future_padding_length: 16
starting_percentile_max: 1.0
starting_percentile_min: 0.0
index_pool_size_per_episode: -1 # Use all indices
seed: ${seed}
use_relative_pose: false
use_relative_gripper_width: false
# normalizer_sample_num: -1 # Use all data
normalizer_sample_num: -1
normalizer_dir: ???
repeat_dataset_num: ??? # How many times to repeat the dataset. This will avoid the dataset being consumed too fast and the reload time being too long.
down_sample_steps: 1


image_keys: ["third_person_camera", "robot0_wrist_camera"]
# proprio_keys: ["robot0_8d"] # Should be overridden if there are multiple proprio keys
action_keys: ["action0_8d"] # Should be overridden if there are multiple action keys

proprio_keys: []
# action_keys: ["robot0_8d"]

apply_image_augmentation_in_cpu: true
source_data_meta:
  robot0_wrist_camera:
    include_indices: ${workspace.model.image_indices}
    # include_indices: [0, 16] # For future_0_wrist_camera
    shape: [128, 128, 3]

  third_person_camera:
    include_indices: ${workspace.model.image_indices}
    shape: [128, 128, 3]

  robot0_8d:
    include_indices: ${workspace.model.proprio_indices}
    # include_indices: ${workspace.model.action_indices}
    shape: [8]

  action0_8d:
    include_indices: ${workspace.model.action_indices}
    shape: [8]

output_data_meta:
  robot0_wrist_camera:
    data_type: image
    length: ${workspace.model.image_length}
    normalizer: identity # Normalization should be done in the observation encoder according to the model
    augmentation:

      # # FAIR_COMPARISON: To match the original training config
      # - name: Resize 
      #   size: [128, 128]
      #   antialias: True
      - name: RandomCrop
        size: [112, 112]
        p: 0.3

      # # Best performance
      # - name: RandomCrop
      #   size: [224, 224]
      #   p: 0.3
        
      - name: Resize
        size: [256, 256]
        antialias: True
      - name: ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08
        p: 0.5

    shape: [3, 256, 256] # For pytorch compatibility, move the color channel to the first dimension
    source_entry_names:
      - robot0_wrist_camera

  third_person_camera:
    name: third_person_camera
    data_type: image
    length: ${workspace.model.image_length}
    normalizer: identity
    augmentation:

      # # FAIR_COMPARISON: To match the original training config
      # - name: Resize 
      #   size: [128, 128]
      #   antialias: True
      - name: RandomCrop
        size: [112, 112]
        p: 0.3

      # # Best performance
      # - name: RandomCrop
      #   size: [224, 224]
      #   p: 0.3

      - name: Resize
        size: [256, 256]
        antialias: True
      - name: ColorJitter
        brightness: 0.3
        contrast: 0.4
        saturation: 0.5
        hue: 0.08
        p: 0.3
    shape: [3, 256, 256]
    source_entry_names:
      - third_person_camera

      
  robot0_8d:
    name: robot0_8d
    data_type: low_dim
    # length: ${workspace.model.action_length}
    length: ${workspace.model.proprio_length}
    normalizer: range
    # augmentation: # To avoid the model overfitting to extremely small movements
    #   - name: RandomGaussianNoise
    #     std: 0.005
    #     p: 0.3
    augmentation: []
    shape: [8]
    source_entry_names:
    - robot0_8d

  action0_8d:
    name: action0_8d
    data_type: low_dim
    length: ${workspace.model.action_length}
    normalizer: range
    augmentation: []
    shape: [8]
    source_entry_names:
      - action0_8d


dataloader_cfg:
  batch_size: ${cond:${in:${policy_name},midhist,longhist},16,64}
  num_workers: 24
  shuffle: True
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 1 # Each worker will prefetch 1 batch

statistics_data_path: "" # For memory gate training which needs an additional file