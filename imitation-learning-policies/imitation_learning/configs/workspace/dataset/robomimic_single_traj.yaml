_target_: imitation_learning.datasets.robomimic_dataset.RobomimicSingleTrajDataset

root_dir: ???
name: ???
robot_num: ???
compressed_dir: "" # Should be overridden if need to extract the dataset from a compressed file
include_episode_num: -1 # To specify how many episodes to include. -1 means using all episodes.
include_episode_indices: [] # If not empty, will override used_episode_ratio
used_episode_ratio: 0.98 # How many episodes are used for training
random_split_dataset: true # If false, will not use random split for the dataset
history_padding_length: ${workspace.model.history_padding_length}
future_padding_length: 16
starting_percentile_max: 1.0
starting_percentile_min: 0.0
index_pool_size_per_episode: -1 # Use all indices
seed: ${seed}
use_relative_pose: false
use_relative_gripper_width: false
normalizer_sample_num: -1 # Use all data
normalizer_dir: ???
repeat_dataset_num: 10 # How many times to repeat the dataset. This will avoid the dataset being consumed too fast and the reload time being too long.
down_sample_steps: 1

image_keys: ??? # Should be overridden in the task config
proprio_keys: ["robot0_10d"] # Should be overridden if there are multiple proprio keys
action_keys: ["action0_10d"] # Should be overridden if there are multiple action keys


apply_image_augmentation_in_cpu: true
source_data_meta:
  robot0_eef_pos:
    name: robot0_eef_pos
    include_indices: ${workspace.model.proprio_indices}
    shape: [3]

  robot0_eef_quat:
    name: robot0_eef_quat
    include_indices: ${workspace.model.proprio_indices}
    shape: [4]

  robot0_gripper_qpos:
    name: robot0_gripper_qpos
    include_indices: ${workspace.model.proprio_indices}
    shape: [2]

  abs_actions:
    name: abs_actions
    include_indices: ${workspace.model.action_indices}
    shape: [7]

  
output_data_meta:
  robot0_10d:
    name: robot0_10d
    data_type: low_dim
    length: ${workspace.model.proprio_length}
    normalizer: range
    augmentation: []
    shape: [10]
    source_entry_names:
      - robot0_eef_pos
      - robot0_eef_quat
      - robot0_gripper_qpos
    
  action0_10d:
    name: action0_10d
    data_type: low_dim
    length: ${workspace.model.action_length}
    normalizer: range
    augmentation: []
    shape: [10]
    source_entry_names:
      - abs_actions

dataloader_cfg:
  batch_size: ${cond:${in:${policy_name},midhist,longhist},16,64}
  num_workers: 24
  shuffle: True
  pin_memory: True
  persistent_workers: True
  prefetch_factor: 1 # Each worker will prefetch 1 batch

statistics_data_path: "" # For memory gate training which needs an additional file