  - object@cloth: cloth
  # - object@cube: cube
  - robot@ur5e_left: ur5e_wsg50_finray
  - robot@ur5e_right: ur5e_wsg50_finray
  - _self_

_target_: env.modules.envs.table_only_2robots_1cloth.TableOnly2Robots1Cloth

ur5e_left:
  arm_name: ur5e_left

ur5e_right:
  arm_name: ur5e_right

cloth:
  qadr_start: 16 # two robots each has 8 joints (6dof + 2gripper), thus the qadr_start is 16
  # This parameter should be set inside the python code, but I couldn't find a way to get it


robots:
  - ${task.env.ur5e_left}
  - ${task.env.ur5e_right}

objects:
